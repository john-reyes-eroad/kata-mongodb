services:

  # Run MongoDB only: docker-compose up mongo
  mongo:
    image: mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: kata_mongodb
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "mongodb://localhost:27017/admin", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 5s
      timeout: 5s
      retries: 10
    logging:
      driver: local
      options:
        max-size: 10m
        max-file: "3"

  app-native:
    profiles: ["native"]
    build:
      context: .
      dockerfile: Dockerfile.native
    image: kata-mongodb-native
    networks:
      default:
        aliases:
          - app
    environment:
      SPRING_APPLICATION_NAME: kata-mongodb
      SPRING_MONGODB_URI: mongodb://mongo:27017/kata_mongodb
      SPRING_MONGODB_DATABASE: kata_mongodb
      SERVER_PORT: 8080
    cpus: 1.0
    mem_limit: 512m
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/busybox", "wget", "-q", "--spider", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    logging:
      driver: local
      options:
        max-size: 10m
        max-file: "3"
    restart: unless-stopped

  app-java:
    profiles: ["java"]
    build:
      context: .
      dockerfile: Dockerfile.java
    image: kata-mongodb-java
    networks:
      default:
        aliases:
          - app
    environment:
      SPRING_APPLICATION_NAME: kata-mongodb
      SPRING_MONGODB_URI: mongodb://mongo:27017/kata_mongodb
      SPRING_MONGODB_DATABASE: kata_mongodb
      SERVER_PORT: 8080
    cpus: 1.0
    mem_limit: 512m
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/busybox", "wget", "-q", "--spider", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    logging:
      driver: local
      options:
        max-size: 10m
        max-file: "3"
    restart: unless-stopped

  kong:
    profiles: ["native", "java"]
    image: kong:3.9
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
    ports:
      - "8000:8000"
      - "8001:8001"
    volumes:
      - ./kong/kong.yml:/kong/kong.yml:ro
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    logging:
      driver: local
      options:
        max-size: 10m
        max-file: "3"
    restart: unless-stopped

volumes:
  mongo_data:
