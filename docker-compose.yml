services:

  # Run MongoDB only: docker-compose up mongo
  mongo:
    image: mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: kata_mongodb
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "mongodb://localhost:27017/admin", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 5s
      timeout: 5s
      retries: 10
    logging:
      driver: local
      options:
        max-size: 10m
        max-file: "3"

  app-native:
    profiles: ["native"]
    build:
      context: .
      dockerfile: Dockerfile.native
    image: kata-mongodb-native
    ports:
      - "8080:8080"
    networks:
      default:
        aliases:
          - app
    environment:
      SPRING_APPLICATION_NAME: kata-mongodb
      SPRING_MONGODB_URI: mongodb://mongo:27017/kata_mongodb
      SPRING_MONGODB_DATABASE: kata_mongodb
      SERVER_PORT: 8080
    cpus: 1.0
    mem_limit: 512m
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/busybox", "wget", "-q", "--spider", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    logging:
      driver: local
      options:
        max-size: 10m
        max-file: "3"
    restart: unless-stopped

  app-java:
    profiles: ["java"]
    build:
      context: .
      dockerfile: Dockerfile.java
    image: kata-mongodb-java
    ports:
      - "8080:8080"
    networks:
      default:
        aliases:
          - app
    environment:
      SPRING_APPLICATION_NAME: kata-mongodb
      SPRING_MONGODB_URI: mongodb://mongo:27017/kata_mongodb
      SPRING_MONGODB_DATABASE: kata_mongodb
      SERVER_PORT: 8080
    cpus: 1.0
    mem_limit: 512m
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/busybox", "wget", "-q", "--spider", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    logging:
      driver: local
      options:
        max-size: 10m
        max-file: "3"
    restart: unless-stopped

  floci:
    profiles: ["native", "java"]
    image: floci/floci:latest
    ports:
      - "4566:4566"
    volumes:
      - ./data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    logging:
      driver: local
      options:
        max-size: 10m
        max-file: "3"

  lambda-init:
    profiles: ["native", "java"]
    image: python:3.12-slim
    environment:
      AWS_ENDPOINT_URL: http://floci:4566
    volumes:
      - ./lambda:/lambda-src:ro
    depends_on:
      floci:
        condition: service_healthy
    command: >
      sh -c "pip install boto3 -q && python /lambda-src/deploy.py"
    restart: on-failure
    logging:
      driver: local
      options:
        max-size: 10m
        max-file: "3"

  kong:
    profiles: ["native", "java"]
    image: kong:latest
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
      KONG_UNTRUSTED_LUA_SANDBOX_REQUIRES: resty.http,cjson
    ports:
      - "9090:8000"
      - "8001:8001"
    volumes:
      - ./kong/kong.yml:/kong/kong.yml:ro
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      lambda-init:
        condition: service_completed_successfully
    logging:
      driver: local
      options:
        max-size: 10m
        max-file: "3"
    restart: unless-stopped

volumes:
  mongo_data:
