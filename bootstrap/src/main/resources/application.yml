spring:
  application:
    name: kata-mongodb
  mongodb:
    uri: mongodb://localhost:27017/kata_mongodb
    database: kata_mongodb

server:
  port: 8080

rate-limit:
  requests-per-second: 50
  maximum-clients: 10000
  client-idle-timeout: PT10M

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
